name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out both repos — footprint-demo needs footprint-samples as a sibling
      # so the file:../footprint-samples dep resolves, and so that the Vite alias
      # (footprint → footprintjs) can resolve imports inside demos/*.ts at build time.
      - uses: actions/checkout@v4
        with:
          path: footprint-demo

      - uses: actions/checkout@v4
        with:
          repository: footprintjs/footprint-samples
          path: footprint-samples

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Replace file: links with npm versions for CI.
      # footprint-samples stays as file:../footprint-samples (resolved from sibling checkout).
      - name: Swap local deps for npm packages
        working-directory: footprint-demo
        run: |
          sed -i 's|"footprintjs": "file:../footPrint"|"footprintjs": "^3.0.0"|' package.json
          sed -i 's|"footprint-explainable-ui": "file:../explainable-ui"|"footprint-explainable-ui": "^0.12.0"|' package.json
          rm -f package-lock.json

      - run: npm install
        working-directory: footprint-demo

      # Skip tsc in CI (local file: deps cause type resolution issues)
      # Vite resolves 'footprint' imports inside footprint-samples/demos via the
      # footprint → footprintjs alias defined in vite.config.ts.
      - run: npx vite build
        working-directory: footprint-demo
        env:
          VITE_BASE: /footprint-demo/

      - run: cp dist/index.html dist/404.html
        working-directory: footprint-demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: footprint-demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
